<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Kurdii Money Dashboard</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
padding:20px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:12px;
margin-bottom:20px;
}

input{
width:100%;
padding:10px;
margin-top:10px;
}

button{
margin-top:10px;
padding:10px;
background:#6366f1;
color:white;
border:none;
border-radius:6px;
}

</style>

</head>

<body>

<h1>Kurdii Money Tracker</h1>

<div class="card">

<h3>دخل</h3>

<input id="income" placeholder="ادخل المبلغ">

<button onclick="addIncome()">Add Income</button>

</div>


<div class="card">

<h3>مصروف</h3>

<input id="expense" placeholder="ادخل المصروف">

<button onclick="addExpense()">Add Expense</button>

</div>


<div class="card">

<h3>النتائج</h3>

<p>Total Income: <span id="incomeTotal">0</span></p>

<p>Total Expense: <span id="expenseTotal">0</span></p>

<p>Balance: <span id="balance">0</span></p>

</div>



<script>

let incomeTotal=0
let expenseTotal=0

function addIncome(){

let value=Number(document.getElementById("income").value)

incomeTotal+=value

update()

}

function addExpense(){

let value=Number(document.getElementById("expense").value)

expenseTotal+=value

update()

}

function update(){

let balance=incomeTotal-expenseTotal

document.getElementById("incomeTotal").innerText=incomeTotal
document.getElementById("expenseTotal").innerText=expenseTotal
document.getElementById("balance").innerText=balance

}

</script>

</body>
</html>
