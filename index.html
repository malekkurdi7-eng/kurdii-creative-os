<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kurdii Creative AI Studio</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
margin:0;
}

.header{
background-image:url("https://images.unsplash.com/photo-1500530855697-b586d89ba3ee");
background-size:cover;
background-position:center;
padding:80px 20px;
text-align:center;
}

.header h1{
background:rgba(0,0,0,0.6);
display:inline-block;
padding:15px 30px;
border-radius:10px;
}

.container{
max-width:1000px;
margin:auto;
padding:30px;
}

.card{
background:#1e293b;
padding:25px;
border-radius:14px;
margin-bottom:25px;
}

.tools{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:12px;
}

a.tool{
background:#334155;
padding:12px;
border-radius:8px;
color:white;
text-decoration:none;
text-align:center;
}

input{
width:100%;
padding:12px;
border-radius:8px;
border:none;
margin-top:10px;
}

button{
margin-top:10px;
padding:12px 20px;
border:none;
border-radius:8px;
background:#6366f1;
color:white;
cursor:pointer;
}

pre{
background:#020617;
padding:15px;
border-radius:8px;
overflow:auto;
margin-top:15px;
}

</style>
</head>

<body>

<div class="header">
<h1>Kurdii Creative AI Studio</h1>
</div>

<div class="container">

<div class="card">
<h2>Quick Tools</h2>

<div class="tools">

<a class="tool" href="https://chat.openai.com" target="_blank">ChatGPT</a>
<a class="tool" href="https://freepik.com" target="_blank">Freepik</a>
<a class="tool" href="https://leonardo.ai" target="_blank">Leonardo AI</a>
<a class="tool" href="https://runwayml.com" target="_blank">Runway AI</a>

</div>

</div>


<div class="card">

<h2>AI Prompt Generator</h2>

<p>اكتب فكرة مشروعك:</p>

<input id="ideaInput" placeholder="example: Petra tourism cinematic reel">

<button onclick="generatePrompts()">Generate 10 JSON Prompts</button>

<button onclick="copyPrompts()">Copy All</button>

<pre id="promptOutput">
Waiting for idea...
</pre>

</div>

</div>


<script>

function generatePrompts(){

let idea=document.getElementById("ideaInput").value

if(!idea){
alert("write idea first")
return
}

let prompts=[]

for(let i=1;i<=10;i++){

prompts.push({

idea:idea,

scene:"concept "+i,

style:"cinematic advertising",

camera:"dramatic composition",

lighting:"epic cinematic lighting",

prompt:idea+" cinematic advertising scene "+i+" ultra detailed 8k dramatic lighting"

})

}

document.getElementById("promptOutput").textContent=
JSON.stringify(prompts,null,2)

}

function copyPrompts(){

let text=document.getElementById("promptOutput").textContent

navigator.clipboard.writeText(text)

alert("Copied")

}

</script>

</body>
</html>
