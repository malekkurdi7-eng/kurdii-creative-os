<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kurdii Creative AI</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
margin:0;
padding:0;
}

.header{
background-image:url("https://images.unsplash.com/photo-1500530855697-b586d89ba3ee");
background-size:cover;
background-position:center;
padding:80px 20px;
text-align:center;
}

.header h1{
background:rgba(0,0,0,0.6);
display:inline-block;
padding:15px 30px;
border-radius:10px;
}

.container{
padding:30px;
max-width:900px;
margin:auto;
}

.card{
background:#1e293b;
padding:20px;
border-radius:12px;
margin-bottom:20px;
}

button{
padding:12px 20px;
border:none;
border-radius:8px;
background:#6366f1;
color:white;
cursor:pointer;
}

button:hover{
background:#4f46e5;
}

pre{
background:#020617;
padding:15px;
border-radius:8px;
overflow:auto;
}

</style>

</head>

<body>

<div class="header">
<h1>Kurdii Creative AI Studio</h1>
</div>

<div class="container">

<div class="card">

<h2>AI Prompt Generator</h2>

<pre id="promptBox">
Press Generate
</pre>

<button onclick="generatePrompt()">Generate JSON Prompt</button>
<button onclick="copyPrompt()">Copy</button>

</div>

</div>

<script>

function generatePrompt(){

const prompts=[

{
scene:"Petra cinematic reveal",
style:"epic cinematic lighting",
camera:"drone wide shot",
colors:"warm desert tones",
prompt:"cinematic drone shot revealing Petra treasury at sunrise ultra detailed 8k"
},

{
scene:"Wadi Rum adventure",
style:"desert action",
camera:"low angle tracking",
colors:"orange sand contrast",
prompt:"4x4 jeep driving through Wadi Rum desert dust cinematic lighting"
},

{
scene:"Arabic coffee ad",
style:"luxury product",
camera:"macro shot",
colors:"dark gold tones",
prompt:"luxury arabic coffee steam cinematic product shot dark background"
},

{
scene:"Dead Sea luxury",
style:"travel advertisement",
camera:"aerial shot",
colors:"soft calm tones",
prompt:"aerial cinematic Dead Sea resort luxury travel ad"
}

]

let randomPrompt=prompts[Math.floor(Math.random()*prompts.length)]

document.getElementById("promptBox").textContent=
JSON.stringify(randomPrompt,null,2)

}

function copyPrompt(){

let text=document.getElementById("promptBox").textContent

navigator.clipboard.writeText(text)

alert("Prompt copied")

}

</script>

</body>

</html>
