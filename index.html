<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>Kurdii Creative OS</title>

<style>

body{

font-family:Arial;

background:#050b18;

color:white;

padding:20px;

}

h1{

text-align:center;

margin-bottom:40px;

}

.section{

margin-bottom:30px;

}

.card{

background:#0f172a;

padding:15px;

border-radius:12px;

margin-top:10px;

}

button{

width:100%;

padding:14px;

margin:6px 0;

background:#1e293b;

border:none;

border-radius:8px;

color:white;

font-size:16px;

}

button:hover{

background:#334155;

}

</style>

</head>

<body>

<h1>Kurdii Creative OS</h1>


<div class="section">

<h2>Quick Tools</h2>

<div class="card">

<button onclick="go('https://www.instagram.com/dreamway_dmc')">Instagram DreamWay</button>

<button onclick="go('https://chat.openai.com')">ChatGPT</button>

<button onclick="go('https://mail.google.com')">Gmail</button>

<button onclick="go('https://www.behance.net')">Behance</button>

<button onclick="go('https://www.freepik.com')">Freepik</button>

</div>

</div>


<div class="section">

<h2>AI Idea Generator</h2>

<div class="card">

<button onclick="generateIdea()">Generate Creative Idea</button>

<p id="idea"></p>

</div>

</div>


<div class="section">

<h2>Daily Training</h2>

<div class="card">

<p>Illustrator Training: Create futuristic travel logo</p>

<p>Photoshop Training: Cinematic desert poster</p>

</div>

</div>


<script>

function go(url){

window.open(url,'_blank')

}

function generateIdea(){

let ideas=[

"Petra cinematic tourism poster",

"Luxury Arabic coffee advertisement",

"Desert adventure campaign",

"Minimalist travel brand identity",

"AI futuristic tourism poster"

]

document.getElementById("idea").innerText=

ideas[Math.floor(Math.random()*ideas.length)]

}

</script>

</body>

</html>
