<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tour Pricing Tool</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
padding:20px;
}

.container{
max-width:700px;
margin:auto;
}

.card{
background:#1e293b;
padding:20px;
border-radius:10px;
margin-bottom:20px;
}

textarea,input,select{
width:100%;
padding:10px;
margin-top:8px;
border-radius:6px;
border:none;
}

button{
margin-top:10px;
padding:12px;
background:#6366f1;
border:none;
color:white;
border-radius:6px;
width:100%;
}

.result{
font-size:18px;
margin-top:10px;
}

</style>
</head>

<body>

<h1>Tour Pricing Calculator</h1>

<div class="container">

<div class="card">

<h3>اكتب البرنامج السياحي</h3>

<textarea id="program" rows="6" placeholder="Day1 Airport Amman
Day2 Amman Petra Amman
Day3 Amman Allenby"></textarea>

عدد الليالي
<input id="nights" type="number">

عدد الأشخاص
<input id="people" type="number">

الفندق
<select id="hotel">
<option value="50">3 Star</option>
<option value="80">4 Star</option>
<option value="120">5 Star</option>
</select>

نسبة الربح %
<input id="profit" type="number">

<button onclick="calculate()">Calculate</button>

</div>

<div class="card">

<div class="result">Full Bus Days: <span id="fullBus">0</span></div>

<div class="result">Half Bus Days: <span id="halfBus">0</span></div>

<div class="result">Total Cost: <span id="total">0</span>$</div>

<div class="result">Price Per Person: <span id="perPerson">0</span>$</div>

<div class="result">Price With Profit: <span id="withProfit">0</span>$</div>

</div>

</div>


<script>

function calculate(){

let text=document.getElementById("program").value

let lines=text.split("\n")

let full=0
let half=0

lines.forEach(day=>{

let words=day.trim().split(" ")

if(words.length<=2){

half++

}else{

full++

}

})

let nights=Number(document.getElementById("nights").value)

let people=Number(document.getElementById("people").value)

let hotel=Number(document.getElementById("hotel").value)

let profit=Number(document.getElementById("profit").value)

let busCost=(full*600)+(half*300)

let guideCost=lines.length*130

let lunchCost=lines.length*10*people

let hotelCost=nights*hotel*people

let total=busCost+guideCost+lunchCost+hotelCost

let perPerson=total/people

let withProfit=perPerson+(perPerson*(profit/100))

document.getElementById("fullBus").innerText=full
document.getElementById("halfBus").innerText=half
document.getElementById("total").innerText=total
document.getElementById("perPerson").innerText=perPerson.toFixed(2)
document.getElementById("withProfit").innerText=withProfit.toFixed(2)

}

</script>

</body>
</html>
